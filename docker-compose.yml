version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: scms-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-scms_db}
      MYSQL_USER: ${DB_USER:-scms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-scms_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scms_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: scms-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - scms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: scms-backend
    restart: always
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-scms_db}
      DB_USER: ${DB_USER:-scms_user}
      DB_PASSWORD: ${DB_PASSWORD:-scms_password}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - scms_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: scms-frontend
    restart: always
    environment:
      VITE_API_URL: /api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - scms_network

  nginx:
    image: nginx:alpine
    container_name: scms-nginx
    restart: always
    ports:
      - "8086:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - scms_network

volumes:
  db_data:

networks:
  scms_network:
    driver: bridge
