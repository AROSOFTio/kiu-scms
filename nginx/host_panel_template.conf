# -------------------------------------------------------------------
#  HOST SERVER REVERSE PROXY TEMPLATE
#  Target: scms.arosoft.io
#  Action: Copy and Paste into your Server Control Panel Configuration
# -------------------------------------------------------------------

server {
    # Listen on HTTP and HTTPS (Assuming Certbot/Panel manages your certificates)
    listen 80;
    listen 443 ssl http2;
    server_name scms.arosoft.io;
    
    # NOTE: Your control panel likely injects the SSL paths here automatically!
    # ssl_certificate      /www/server/panel/vhost/cert/scms.arosoft.io/fullchain.pem;
    # ssl_certificate_key  /www/server/panel/vhost/cert/scms.arosoft.io/privkey.pem;

    # Force HTTPS
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }

    # Compress content for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy all traffic to the isolated Docker container running on port 8086
    location / {
        proxy_pass http://127.0.0.1:8086;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # VITAL: Passing real IP to your internal Docker network
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts to prevent Gateway drops on large files
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
    }

    # General static assets caching inside proxy
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf|ico)$
    {
        proxy_pass http://127.0.0.1:8086;
        expires 30d;
        error_log /dev/null;
        access_log off;
    }
    
    location ~ .*\.(js|css)?$
    {
        proxy_pass http://127.0.0.1:8086;
        expires 12h;
        error_log /dev/null;
        access_log off; 
    }
}
