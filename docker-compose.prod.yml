services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiuscms-backend-prod
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      # aaPanel MySQL host — host-gateway maps to host.docker.internal on Linux
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-kiu_scms}
      DB_USER: ${DB_USER:-kiu_scms}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-PROD_SECURE_TOKEN_REPLACE_ME}
      # Increase timeout so slow aaPanel MySQL handshakes don't fail immediately
      DB_CONNECT_TIMEOUT: ${DB_CONNECT_TIMEOUT:-30000}
    # Critical on Linux: maps host.docker.internal -> host machine's gateway IP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - scms_prod_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: kiuscms-frontend-prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - backend
    networks:
      - scms_prod_network

networks:
  scms_prod_network:
    driver: bridge
